<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003893;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC143C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer Hexagonal Frame -->
  <path d="M50 5 L90 25 L90 75 L50 95 L10 75 L10 25 Z" fill="none" stroke="url(#g)" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Stylized KX Text -->
  <g fill="url(#g)">
    <!-- K -->
    <path d="M30 30 L30 70 M30 50 L45 30 M30 50 L45 70" stroke="url(#g)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- X -->
    <path d="M55 30 L75 70 M75 30 L55 70" stroke="url(#g)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
  
  <!-- Status Dot -->
  <circle cx="80" cy="20" r="5" fill="#34c759">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>
