<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4b4b" />
      <stop offset="100%" stop-color="#c41e3a" />
    </linearGradient>
    <filter id="brandGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="40" height="40" rx="10" fill="#050505" />
  <g transform="translate(4, 4)">
    <circle cx="16" cy="16" r="15" stroke="url(#brandGrad)" stroke-width="1" opacity="0.3" stroke-dasharray="3 4" />
    <path d="M16 -2 L16 7 M16 25 L16 34 M-2 16 L7 16 M25 16 L34 16" stroke="url(#brandGrad)" stroke-width="1.5" stroke-linecap="round" filter="url(#brandGlow)" />
    <circle cx="16" cy="16" r="8" stroke="url(#brandGrad)" stroke-width="1.25" opacity="0.8" />
    <circle cx="16" cy="16" r="2.5" fill="#ff4b4b" filter="url(#brandGlow)" />
  </g>
</svg>
