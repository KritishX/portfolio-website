<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4b4b" />
      <stop offset="100%" stop-color="#c41e3a" />
    </linearGradient>
    <filter id="brandGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g transform="translate(0, 0) scale(1.25)">
    {/* Mandala-Reticle Fusion Geometry */}
    <path 
      d="M16 2 L19.5 12.5 L30 16 L19.5 19.5 L16 30 L12.5 19.5 L2 16 L12.5 12.5 Z" 
      stroke="url(#brandGrad)" 
      stroke-width="0.75" 
      opacity="0.3" 
    />
    
    <circle cx="16" cy="16" r="14" stroke="url(#brandGrad)" stroke-width="0.5" opacity="0.15" stroke-dasharray="1 2" />
    <circle cx="16" cy="16" r="11" stroke="url(#brandGrad)" stroke-width="1" opacity="0.4" stroke-dasharray="4 2" />

    {/* Reticle Crosshairs */}
    <path d="M16 0 L16 8 M16 24 L16 32 M0 16 L8 16 M24 16 L32 16" stroke="url(#brandGrad)" stroke-width="1.5" stroke-linecap="square" filter="url(#brandGlow)" />

    {/* KD Initials */}
    <text 
      x="16" y="19.5" 
      fill="url(#brandGrad)" 
      font-size="10.5" 
      font-weight="700" 
      text-anchor="middle" 
      style="font-family: Georgia, serif; font-style: italic;"
    >
      KD
    </text>
    
    <circle cx="16" cy="16" r="1.5" fill="#ff4b4b" />
  </g>
</svg>
