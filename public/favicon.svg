<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4b4b" />
      <stop offset="100%" stop-color="#c41e3a" />
    </linearGradient>
    <filter id="brandGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="40" height="40" rx="10" fill="#000" />
  <g transform="translate(4, 4)">
    {/* Outer static brackets */}
    <path d="M4 12 L4 4 L12 4" stroke="url(#brandGrad)" stroke-width="0.75" opacity="0.4" />
    <path d="M28 12 L28 4 L20 4" stroke="url(#brandGrad)" stroke-width="0.75" opacity="0.4" />
    <path d="M4 20 L4 28 L12 28" stroke="url(#brandGrad)" stroke-width="0.75" opacity="0.4" />
    <path d="M28 20 L28 28 L20 28" stroke="url(#brandGrad)" stroke-width="0.75" opacity="0.4" />
    
    <circle cx="16" cy="16" r="15.5" stroke="url(#brandGrad)" stroke-width="0.8" opacity="0.2" stroke-dasharray="2 4" />
    <circle cx="16" cy="16" r="11" stroke="url(#brandGrad)" stroke-width="1.2" opacity="0.5" stroke-dasharray="10 7" />
    <path d="M16 2 L16 9 M16 23 L16 30 M2 16 L9 16 M23 16 L30 16" stroke="url(#brandGrad)" stroke-width="1.5" stroke-linecap="round" filter="url(#brandGlow)" />
    <circle cx="16" cy="16" r="6" stroke="url(#brandGrad)" stroke-width="1" opacity="0.8" />
    <circle cx="16" cy="16" r="2" fill="#ff4b4b" filter="url(#brandGlow)" />
  </g>
